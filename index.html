<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRIANFLIX</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .logo {
            margin-top: 10vh;
            margin-bottom: 40px;
        }

        .logo img {
            width: 80%;
            max-width: 260px;
            height: auto;
        }

        .menu {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            flex-grow: 1;
        }

        .menu button {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            background: #1c1c1c;
            color: white;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu button:hover {
            background: #e50914;
            border-color: #e50914;
        }

        .footer {
            padding: 20px 0;
            font-size: 14px;
            color: #777;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 360px) {
            .menu button {
                font-size: 1rem;
                padding: 14px;
            }
            .logo {
                margin-top: 40px;
            }
        }
    </style>

    <script>
        function abrir(url) {
            window.location.href = url;
        }
    </script>
</head>

<body>

    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <div class="menu">
        <button onclick="abrir('http://45.225.68.1:8532/?tvplay')">
            📺 TV EN VIVO
        </button>

        <button onclick="abrir('iptv.html')">
            📡 TV EN VIVO 2
        </button>

        <button onclick="abrir('https://elitegoltv.fr/')">
            ⚽ FUTBOL EN VIVO
        </button>

        <button onclick="abrir('http://45.225.68.1:8532/?index')">
            🎬 CINE Y SERIES
        </button>
    </div>

    <div class="footer">
        ADRIANFLIX
    </div>

</body>
</html>
