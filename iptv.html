<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>ADRIANFLIX</title>

  <style>
    :root {
      --primary: #e50914;
      --bg: #000000;
      --sidebar-bg: #141414;
      --card-bg: #222;
      --text: #ffffff;
      --text-dim: #b3b3b3;
      --sidebar-width: 320px;
      --focus-border: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg); color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .app-wrapper { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

    .header {
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: #000; z-index: 10; flex-shrink: 0;
    }

    .logo-box { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 30px; height: 30px; object-fit: contain; }
    .logo-box h1 { font-size: 20px; color: var(--primary); margin: 0; font-weight: 900; letter-spacing: 1px; }

    .header-btns { display: flex; gap: 8px; }
    .nav-btn {
      background: #222; border: 1px solid transparent;
      color: white; padding: 6px 12px; border-radius: 4px;
      font-size: 12px; font-weight: bold; cursor: pointer;
    }
    .nav-btn.active { background: var(--primary); }
    .nav-btn:focus { border-color: var(--focus-border); background: #444; }

    .main-container {
      display: flex; flex-grow: 1; overflow: hidden; padding: 0 12px 12px 12px; gap: 12px;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid #222;
    }

    .sidebar-top {
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      background: rgba(255,255,255,0.02); border-bottom: 1px solid #222;
    }

    .search-bar {
      width: 100%; background: #000; border: 1px solid #333;
      color: white; padding: 10px 12px; border-radius: 8px; font-size: 14px;
    }
    .search-bar:focus { border-color: var(--primary); }

    .cat-list {
      display: flex; flex-direction: column; gap: 6px;
      flex-shrink: 0; max-height: 220px; overflow-y: auto;
    }
    .cat-list::-webkit-scrollbar { display: none; }

    .cat-item {
      background: #222; padding: 8px 14px; border-radius: 6px;
      font-size: 12px; cursor: pointer; border: 1px solid #333;
      color: var(--text-dim); text-align: left; width: 100%;
    }
    .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }
    .cat-item:focus { border-color: var(--focus-border); background: #333; }

    .channel-grid {
      flex-grow: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .channel-card {
      display: flex; align-items: center; gap: 12px; padding: 10px;
      background: #1a1a1a; border-radius: 8px; cursor: pointer;
      border: 1px solid #282828; transition: 0.2s;
    }
    .channel-card:focus { border-color: var(--focus-border); background: #252525; transform: scale(1.02); }
    .channel-card.selected { border-left: 4px solid var(--primary); background: #222; }

    .ch-icon {
      width: 40px; height: 40px; border-radius: 6px;
      background: #1e1e1e; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: white; flex-shrink: 0;
      letter-spacing: -0.5px; text-align: center; line-height: 1.2;
      border: 1px solid #333;
    }

    .ch-info { overflow: hidden; }
    .ch-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-cat { font-size: 11px; color: var(--text-dim); }

    .content-area { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }

    .video-box {
      width: 100%; aspect-ratio: 16 / 9; background: #000;
      border-radius: 12px; overflow: hidden; position: relative;
      border: 1px solid #222;
    }
    .video-box:focus { border-color: var(--primary); }

    #player { width: 100%; height: 100%; }

    .info-panel {
      background: var(--sidebar-bg); padding: 15px; border-radius: 12px;
      display: flex; gap: 15px; align-items: center; border: 1px solid #222;
    }
    .info-icon {
      width: 60px; height: 60px; border-radius: 8px;
      background: #1e1e1e; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: white; flex-shrink: 0;
    }
    .info-text h2 { margin: 0 0 4px 0; font-size: 20px; }
    .info-text p { margin: 0; color: var(--text-dim); font-size: 14px; }

    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #555; margin-right: 6px; vertical-align: middle;
    }
    .status-dot.live { background: var(--primary); animation: blink 1.5s infinite; }
    .status-dot.loading { background: #f4a261; animation: blink 0.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    @media (max-width: 1024px) { :root { --sidebar-width: 260px; } }
  </style>
</head>

<div class="app-wrapper">
  <header class="header">
    <div class="logo-box">

    </div>
    <div class="header-btns">
      <button id="btn-reload" class="nav-btn" tabindex="1">🔄 RECARGAR</button>
    </div>
  </header>

  <main class="main-container">
    <aside class="sidebar">
      <div class="sidebar-top">

        <div id="categories" class="cat-list"></div>
      </div>
      <div id="list" class="channel-grid"></div>
    </aside>

    <section class="content-area">
      <div class="video-box" id="v-container" tabindex="10">

      </div>
      <div class="info-panel">
        <div class="info-icon" id="info-icon">📺</div>
        <div class="info-text">

    </section>
  </main>
</div>

// ── APP STATE ────────────────────────────────────────────────────────────────
let filtered = [], current = null, activeCat = 'Todas', currentHls = null;

const listEl    = document.getElementById('list');
const catEl     = document.getElementById('categories');
const searchEl  = document.getElementById('search');
const player    = document.getElementById('player');
const statusDot = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-text');

// ── ICON: initials from channel name ────────────────────────────────────────
function initials(name) {
  const words = name.replace(/[^a-záéíóúñü\d\s]/gi,'').trim().split(/\s+/);
  if (words.length === 1) return words[0].substring(0,3).toUpperCase();
  return (words[0][0] + words[1][0]).toUpperCase();
}

const GROUP_COLORS = {
  'General':'#444','Noticias':'#1a4a7a','Aire':'#1a5c2a','ESPN':'#c0392b',
  'Deportes':'#7d3c98','Infantiles':'#e67e22','HBO':'#1a1a6e','Cine':'#8b0000',
  'Series':'#0e6655','Entretenimiento':'#7b6e00','Novelas':'#8e3a59',
  'Discovery':'#2e7da6','Documentales':'#4a6741','Música y Varios':'#5d4037',
  'Internacional':'#2d4a22'
};

function iconStyle(group) {
  const bg = GROUP_COLORS[group] || '#333';
  return `background:${bg};`;
}

// ── RENDER CATEGORIES ────────────────────────────────────────────────────────
function renderCats() {
  const groups = ['Todas', ...new Set(CHANNELS.map(c => c.group))];
  catEl.innerHTML = '';
  groups.forEach((g, i) => {
    const el = document.createElement('div');
    el.className = `cat-item ${activeCat === g ? 'active' : ''}`;
    el.textContent = g;
    el.tabIndex = 10 + i;
    el.onclick = () => { activeCat = g; renderCats(); update(); };
    catEl.appendChild(el);
  });
}

// ── RENDER CHANNEL LIST ──────────────────────────────────────────────────────
function update() {
  const q = searchEl.value.toLowerCase();
  filtered = CHANNELS.filter(c => {
    if (activeCat !== 'Todas' && c.group !== activeCat) return false;
    return c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q);
  });

  listEl.innerHTML = '';
  filtered.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = `channel-card ${current?.url === c.url ? 'selected' : ''}`;
    card.tabIndex = 100 + i;
    const iconContent = c.logo
      ? `<img src="${c.logo}" alt="${c.name}" style="width:36px;height:36px;object-fit:contain;border-radius:4px;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${initials(c.name)}</span>`
      : initials(c.name);
    card.innerHTML = `
      <div class="ch-icon" style="${c.logo ? 'background:#111;padding:2px;' : iconStyle(c.group)}">${iconContent}</div>
      <div class="ch-info">
        <div class="ch-name">${c.name}</div>
        <div class="ch-cat">${c.group}</div>
      </div>
    `;
    card.onclick = () => play(c);
    listEl.appendChild(card);
  });
}

// ── PLAY ─────────────────────────────────────────────────────────────────────
function setStatus(type, text) {
  statusDot.className = 'status-dot ' + type;
  statusTxt.textContent = text;
}

function play(c) {
  current = c;

  // update selected card
  document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('selected'));
  const idx = filtered.findIndex(f => f.url === c.url);
  if (idx !== -1) {
    const cards = listEl.querySelectorAll('.channel-card');
    cards[idx]?.classList.add('selected');
    cards[idx]?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  document.getElementById('info-name').textContent = c.name;
  document.getElementById('info-desc').innerHTML =
    `<span class="status-dot loading" id="status-dot"></span><span id="status-text">Conectando...</span>`;

  // destroy old hls
  if (currentHls) { currentHls.destroy(); currentHls = null; }
  player.src = '';

  const dot = () => document.getElementById('status-dot');
  const txt = () => document.getElementById('status-text');

  const infoIcon = document.getElementById('info-icon');
  if (c.logo) {
    infoIcon.innerHTML = `<img src="${c.logo}" alt="${c.name}" style="width:52px;height:52px;object-fit:contain;border-radius:6px;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${initials(c.name)}</span>`;
    infoIcon.style = 'background:#111;padding:3px;';
  } else {
    infoIcon.textContent = initials(c.name);
    infoIcon.style = iconStyle(c.group);
  }

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: false, lowLatencyMode: true });
    currentHls = hls;
    hls.loadSource(c.url);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      player.play().catch(() => {});
      if (dot()) { dot().className = 'status-dot live'; txt().textContent = '🔴 EN VIVO'; }
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal && txt()) txt().textContent = '⚠ Error de señal';
    });
  } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
    player.src = c.url;
    player.play().catch(() => {});
    if (dot()) { dot().className = 'status-dot live'; txt().textContent = '🔴 EN VIVO'; }
  }
}

// ── KEYBOARD NAV ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  if (e.key === 'Enter') {
    if (active.classList.contains('channel-card')) active.click();
    if (active.classList.contains('cat-item')) active.click();
    if (active.classList.contains('nav-btn')) active.click();
    if (active.id === 'v-container') {
      if (document.fullscreenElement) document.exitFullscreen();
      else active.requestFullscreen().catch(() => player.requestFullscreen());
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    if (active.classList.contains('nav-btn')) searchEl.focus();
    else if (active === searchEl) (catEl.querySelector('.cat-item') || listEl.querySelector('.channel-card'))?.focus();
    else if (active.classList.contains('cat-item')) active.nextElementSibling?.focus() || listEl.querySelector('.channel-card')?.focus();
    else if (active.classList.contains('channel-card')) active.nextElementSibling?.focus();
  }
  if (e.key === 'ArrowUp') {
    if (active.classList.contains('channel-card')) {
      if (active.previousElementSibling) active.previousElementSibling.focus();
      else (catEl.querySelector('.cat-item.active') || catEl.querySelector('.cat-item'))?.focus();
    } else if (active.classList.contains('cat-item')) {
      if (active.previousElementSibling) active.previousElementSibling.focus();
      else searchEl.focus();
    } else if (active === searchEl) document.getElementById('btn-reload').focus();
  }
  if (e.key === 'ArrowRight') {
    if (active.classList.contains('channel-card') || active === searchEl) document.getElementById('v-container').focus();
  }
  if (e.key === 'ArrowLeft') {
    if (active.id === 'v-container') (listEl.querySelector('.channel-card.selected') || listEl.querySelector('.channel-card'))?.focus();
  }
  setTimeout(() => {
    if (document.activeElement.classList.contains('channel-card'))
      document.activeElement.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 50);
});

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('btn-reload').onclick = () => location.reload();
searchEl.oninput = () => update();

// ── INIT ─────────────────────────────────────────────────────────────────────
renderCats();
update();
</script>
